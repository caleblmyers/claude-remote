# Claude Remote Configuration
# Copy this file to claude-remote.config.yaml and fill in your values.
# The config file is gitignored — your secrets stay local.

server:
  port: 3000
  host: "0.0.0.0"

# Auth secret used for JWT token generation.
# Pick something random: `openssl rand -hex 32`
auth:
  secret: "change-me-to-a-random-string"

# VAPID keys for push notifications.
# Generate with: npx web-push generate-vapid-keys
vapid:
  publicKey: "your-vapid-public-key"
  privateKey: "your-vapid-private-key"
  mailto: "mailto:you@example.com"

# CORS configuration.
# allowedOrigins controls which browser origins can make requests.
# When empty (default), origins are auto-derived for local dev:
#   http://localhost:<server.port>, http://localhost:5173, http://localhost:5174
# For Tailscale or production, add your phone's origin explicitly:
#   allowedOrigins: ["http://100.x.y.z:3000"]
# Use ['*'] to allow all origins (not recommended).
# Can also be set via CLAUDE_REMOTE_CORS_ORIGINS env var (comma-separated).
cors:
  allowedOrigins: []

# Repos that Claude can work in.
# Each repo needs an absolute path on the machine running the backend.
repos:
  - name: my-project
    path: /home/you/projects/my-project
    templates:
      - name: Run tests
        prompt: "Run the test suite and report results"
        trustLevel:
          autoApprove: [Read, Bash]
          alwaysAsk: []
          deny: []

  - name: another-repo
    path: /home/you/projects/another-repo
    defaultTrustPreset: observe  # auto-select "observe" trust level for new tasks in this repo

# Templates available across all repos.
globalTemplates:
  - name: Run tests
    prompt: "Run the test suite and fix any failures"
    trustLevel:
      autoApprove: [Read, Grep, Glob, Bash]
      alwaysAsk: [Edit, Write]
      deny: []
  - name: Code review
    prompt: "Review recent changes for bugs, security issues, and style"
    trustLevel:
      autoApprove: [Read, Grep, Glob]
      alwaysAsk: [Bash, Edit, Write]
      deny: []
  - name: Commit changes
    prompt: "Review the changes, write a clear commit message, and commit"
    trustLevel:
      autoApprove: [Read, Grep, Glob, Bash]
      alwaysAsk: []
      deny: []

# Default trust level for new tasks when no template is selected.
# Trust presets: "observe" (read-only), "code" (read+edit), "auto" (everything except Bash)
# Or specify custom per-tool rules:
defaults:
  trustLevel:
    autoApprove: [Read, Grep, Glob, Edit, Write]
    alwaysAsk: [Bash]
    deny: []
  notifications:
    onComplete: true
    onError: true
    onPermission: true
